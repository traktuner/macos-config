### General Configuration for macOS Setup
### Used by various utility scripts

# ─────────────────────────────────────────────────────────────────────────────
# SMB Configuration for SSH Keys (used by 04-ssh-keys.sh)
# ─────────────────────────────────────────────────────────────────────────────
SMB_SERVER="172.16.10.200"
SMB_USER_PATH="tom/tresor/ssh"
SMB_MOUNT_POINT="/Volumes/ssh"

# ─────────────────────────────────────────────────────────────────────────────
# Wallpaper Configuration (used by 03-macos.sh)
