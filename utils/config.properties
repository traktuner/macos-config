WALLPAPER_PATH="$HOME/Library/Mobile Documents/com~apple~CloudDocs/wallpaper/default.jpeg"

# ─────────────────────────────────────────────────────────────────────────────
# Time Machine Configuration
# ─────────────────────────────────────────────────────────────────────────────
TM_ENABLED=true
TM_AUTO_BACKUP=true